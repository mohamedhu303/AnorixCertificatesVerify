<header class="anorix-header">
  <div class="header-container">

    <!-- Logo Section -->
    <a routerLink="/home" class="logo-link" aria-label="Go to home">
      <div class="logo">
        <img src="assets/images/logo.svg" alt="ANORIX" class="logo-img" />
      </div>
    </a>

    <!-- Back Button Section -->
    <button
      *ngIf="showBackButton"
      type="button"
      class="back-btn"
      (click)="goBack()"
      aria-label="Go back"
    >
      <span class="arrow">
        <svg width="16" height="12" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M17 7H1M7 13L1 7L7 1"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span class="text">Back</span>
    </button>

  </div>
</header>
